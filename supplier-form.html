<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>供應商資料管理系統｜新增供應商</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">供應商系統</div>
      <nav>
        <a href="suppliers.html">供應商清單</a>
        <a href="supplier-form.html" class="active">新增供應商</a>
        <a href="#" id="logoutBtn">登出</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>新增供應商</h1>
          <p>建立供應商基本資料與聯絡資訊</p>
        </div>
      </header>

      <section class="card">
        <form id="supplierForm" class="supplier-form-grid">
          <div class="form-group">
            <label for="vendorName">供應商名稱</label>
            <input type="text" id="vendorName" required />
          </div>

          <div class="form-group">
            <label for="taxId">統一編號</label>
            <input type="text" id="taxId" required />
          </div>

          <div class="form-group">
            <label for="contactPerson">聯絡人</label>
            <input type="text" id="contactPerson" required />
          </div>

          <div class="form-group">
            <label for="phone">電話</label>
            <input type="text" id="phone" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="form-group">
            <label for="status">合作狀態</label>
            <select id="status" required>
              <option value="合作中">合作中</option>
              <option value="審核中">審核中</option>
              <option value="停用">停用</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="address">地址</label>
            <input type="text" id="address" />
          </div>

          <div class="form-group full-width">
            <label for="remark">備註</label>
            <textarea id="remark" rows="5"></textarea>
          </div>

          <div class="full-width form-actions">
            <button type="submit" class="btn btn-primary">儲存資料</button>
            <a href="suppliers.html" class="btn btn-secondary">返回清單</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
